<!DOCTYPE html>
<html>
    <head>
        <title> My First Webpage</title>

        <meta name="viewport"
            content="width=device-width, initial-scale=1.0">

             <style>
            table{
                border: 1px solid black;
                border-collapse: collapse; 
                border-spacing:5px;
            }

            th, td{
                border:1px solid black;
                padding: 5x;

    </head>
        <body>

            <table>
                <tr>
                    <td>Product</td>
                    <td>Cost</td>
                </tr>
                <tr>
                    <td>Corn</td>
                    <td>$35</td>
                </tr>
                <tr>
                    <td>Carrot</td>

                </tr>

            <br><br>
            <h6>*Enter 0 if you will buy none</h6>

            <br><br>
            <hr>
            <br>

                <br><br>
                <hr>
                <br>

                <br>

                <br>

                <button type="reset"> Reset </button>
            </form>



            <script src="index.js"></script>
